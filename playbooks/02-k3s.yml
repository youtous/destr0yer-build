# This playbook deploys and configures a K3S cluster.
- name: Ensure server_environment is defined and not empty
  hosts: all
  gather_facts: false
  tasks:
    - name: "Check"
      ansible.builtin.assert:
        that: >
          server_environment is defined and server_environment | length > 0
        msg: "server_environment must be defined an not empty"

- name: Install k3s on nodes
  hosts: k3s
  roles:
    - k3s
    - monit_k3s
    - k8s_helm
    - k8s_cilium_cli
    - k3s_cilium_firewall
    - k8s_k9s
    - role: k8s_kluctl
      when: k3s_control_node | default(false)
  tags: ["k3s-setup"]

- name: Apply SELinux file contexts after K3S binary install
  hosts: k3s
  gather_facts: true
  tasks:
    - name: Restore SELinux contexts for K3S paths
      become: true
      ansible.builtin.command:
        cmd: restorecon -R -v {{ item }}
      loop:
        - /usr/local/bin/k3s
        - /var/lib/rancher
        - /etc/rancher
      changed_when: true
      failed_when: false
      when: ansible_facts.selinux.status | default('disabled') == 'enabled'
  tags: ["k3s-setup", "selinux"]

- name: Wait for K3S API to be ready after config changes
  hosts: k3s_control_node[0]
  gather_facts: false
  tasks:
    - name: Wait for K3S API server to respond
      ansible.builtin.command: kubectl get nodes
      register: k3s_ready
      retries: 60
      delay: 5
      until: k3s_ready.rc == 0
      changed_when: false
      become: true
      ignore_errors: false
  tags: ["k3s-setup", "k3s-service-account"]

- name: Harden default ServiceAccounts (CIS 5.1.5)
  hosts: k3s_control_node[0]
  gather_facts: false
  tasks:
    - name: Get all namespaces
      become: true
      ansible.builtin.command: kubectl get namespaces -o jsonpath='{.items[*].metadata.name}'
      register: all_namespaces
      changed_when: false

    - name: Patch default SA in each namespace
      become: true
      ansible.builtin.command: >-
        kubectl patch serviceaccount default -n {{ item }} -p '{"automountServiceAccountToken": false}'
      loop: "{{ all_namespaces.stdout.split() }}"
      changed_when: false
      failed_when: false
  tags: ["k3s-setup", "k3s-hardening"]

- name: Generate admin service account on controllers
  hosts: k3s_control_node
  roles:
    - k8s_service_account_admin
  tags: ["k3s-setup", "k3s-service-account"]

- name: Install k3s internal services - networking
  hosts: k3s_control_node[0]
  roles:
    - k3s_cilium
  tags: ["k3s-setup", "k3s-internal-services", "k3s-internal-networking"]

- name: Setup operator access on controllers
  hosts: k3s_control_node
  roles:
    - k8s_operator_access
  tags: ["k3s-setup", "k3s-operator-access"]

- name: Setup app-deployer access on controllers
  hosts: k3s_control_node
  roles:
    - k8s_app_deployer_access
  tags: ["k3s-setup", "k3s-app-deployer-access"]

  # Remaining K8S services are deployed via Kluctl (see kluctl/ directory)
  # See doc/adr/ for the full roadmap
