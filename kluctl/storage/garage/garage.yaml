apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: garage
  namespace: garage
  labels:
    app.kubernetes.io/name: garage
    app.kubernetes.io/component: object-storage
spec:
  serviceName: garage-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: garage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: garage
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        # renovate: datasource=docker depName=dxflrs/garage
        - name: garage
          image: dxflrs/garage:v2.3.0
          imagePullPolicy: IfNotPresent
          command:
            - /garage
          args:
            - server
          env:
            - name: GARAGE_RPC_SECRET
              valueFrom:
                secretKeyRef:
                  name: garage-rpc-secret
                  key: rpcSecret
          ports:
            - name: s3-api
              containerPort: 3900
              protocol: TCP
            - name: rpc
              containerPort: 3901
              protocol: TCP
            - name: s3-web
              containerPort: 3902
              protocol: TCP
            - name: admin
              containerPort: 3903
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/garage.toml
              subPath: garage.toml
              readOnly: true
            - name: data
              mountPath: /data
          livenessProbe:
            tcpSocket:
              port: s3-api
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: s3-api
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: config
          secret:
            secretName: garage-config
        - name: data
          persistentVolumeClaim:
            claimName: garage-data
---
apiVersion: v1
kind: Service
metadata:
  name: garage-headless
  namespace: garage
  labels:
    app.kubernetes.io/name: garage
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: garage
  ports:
    - name: rpc
      port: 3901
      targetPort: rpc
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: garage
  namespace: garage
  labels:
    app.kubernetes.io/name: garage
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: garage
  ports:
    - name: s3-api
      port: 3900
      targetPort: s3-api
      protocol: TCP
    - name: s3-web
      port: 3902
      targetPort: s3-web
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: garage-admin
  namespace: garage
  labels:
    app.kubernetes.io/name: garage
    app.kubernetes.io/component: admin-api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: garage
  ports:
    - name: admin
      port: 3903
      targetPort: admin
      protocol: TCP
