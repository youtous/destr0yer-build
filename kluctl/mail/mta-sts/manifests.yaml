apiVersion: v1
kind: ConfigMap
metadata:
  name: mta-sts-policy
  namespace: mail
  labels:
    app.kubernetes.io/name: mta-sts
data:
  {% for domain in secrets.mailserver_domains %}
  mta-sts-{{ domain.domain | replace('.', '-') }}.txt: |
    version: STSv1
    mode: {{ domain.mta_sts_mode | default("testing") }}
    mx: {{ args.mail_hostname }}
    max_age: {{ domain.mta_sts_max_age | default("86401") }}
  {% endfor %}
  nginx.conf: |
    {% for domain in secrets.mailserver_domains %}
    server {
        listen 8080;
        server_name mta-sts.{{ domain.domain }};

        location /.well-known/mta-sts.txt {
            alias /etc/nginx/mta-sts/mta-sts-{{ domain.domain | replace('.', '-') }}.txt;
            default_type text/plain;
        }

        location / {
            return 444;
        }
    }
    {% endfor %}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mta-sts
  namespace: mail
  labels:
    app.kubernetes.io/name: mta-sts
spec:
  replicas: {{ args.replicas_mta_sts }}
  selector:
    matchLabels:
      app.kubernetes.io/name: mta-sts
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mta-sts
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        # renovate: datasource=docker depName=nginx
        - name: nginx
          image: docker.io/nginx:1.31.1-alpine@sha256:8b1e78743a03dbb2c95171cc58639fef29abc8816598e27fb910ed2e621e589a
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
              readOnly: true
            - name: policies
              mountPath: /etc/nginx/mta-sts
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 50m
              memory: 16Mi
      volumes:
        - name: config
          configMap:
            name: mta-sts-policy
            items:
              - key: nginx.conf
                path: nginx.conf
        - name: policies
          configMap:
            name: mta-sts-policy
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mta-sts
  namespace: mail
  labels:
    app.kubernetes.io/name: mta-sts
spec:
  selector:
    app.kubernetes.io/name: mta-sts
  ports:
    - port: 80
      targetPort: 8080
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mta-sts
  namespace: mail
  labels:
    app.kubernetes.io/name: mta-sts
  annotations:
    cert-manager.io/cluster-issuer: "{{ args.certmanager_issuer | default('cluster-issuer') }}"
    haproxy-ingress.github.io/allowlist-source-range: "{{ args.public_cidrs | join(',') }}"
spec:
  ingressClassName: haproxy
  tls:
    - hosts:
        {% for domain in secrets.mailserver_domains %}
        - "mta-sts.{{ domain.domain }}"
        {% endfor %}
      secretName: mta-sts-tls
  rules:
    {% for domain in secrets.mailserver_domains %}
    - host: "mta-sts.{{ domain.domain }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mta-sts
                port:
                  number: 80
    {% endfor %}
