apiVersion: apps/v1
kind: Deployment
metadata:
  name: mail-autodiscover
  namespace: mail
  labels:
    app.kubernetes.io/name: mail-autodiscover
spec:
  replicas: {{ args.replicas_autodiscover }}
  selector:
    matchLabels:
      app.kubernetes.io/name: mail-autodiscover
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mail-autodiscover
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        # renovate: datasource=docker depName=wdes/mail-autodiscover-autoconfig
        - name: autodiscover
          image: docker.io/wdes/mail-autodiscover-autoconfig:latest@sha256:dc5c86993d166c0aa0a27ce086a48e5cdd9fae79886fcc34ceb105cd4ceedfe6
          ports:
            - containerPort: 80
              name: http
          env:
            - name: ROCKET_PROFILE
              value: production
            - name: ROCKET_ADDRESS
              value: "0.0.0.0"
            - name: ROCKET_PORT
              value: "80"
            - name: IMAP_HOSTNAME
              value: "{{ args.mail_hostname }}"
            - name: IMAP_PORT
              value: "993"
            - name: IMAP_SOCKET
              value: "SSL"
            - name: SMTP_HOSTNAME
              value: "{{ args.mail_hostname }}"
            - name: SMTP_PORT
              value: "465"
            - name: SMTP_SOCKET
              value: "SSL"
            - name: APPLE_MAIL_UUID
              value: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
            - name: APPLE_PROFILE_UUID
              value: "f0e1d2c3-b4a5-6789-0abc-def123456789"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 50m
              memory: 32Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mail-autodiscover
  namespace: mail
  labels:
    app.kubernetes.io/name: mail-autodiscover
spec:
  selector:
    app.kubernetes.io/name: mail-autodiscover
  ports:
    - port: 80
      targetPort: 80
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mail-autodiscover
  namespace: mail
  labels:
    app.kubernetes.io/name: mail-autodiscover
  annotations:
    cert-manager.io/cluster-issuer: "{{ args.certmanager_issuer | default('cluster-issuer') }}"
    haproxy-ingress.github.io/allowlist-source-range: "{{ args.public_cidrs | join(',') }}"
spec:
  ingressClassName: haproxy
  tls:
    - hosts:
        - "{{ args.autoconfig_domain }}"
        - "{{ args.autodiscover_domain }}"
      secretName: mail-autodiscover-tls
  rules:
    - host: "{{ args.autoconfig_domain }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mail-autodiscover
                port:
                  number: 80
    - host: "{{ args.autodiscover_domain }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mail-autodiscover
                port:
                  number: 80
