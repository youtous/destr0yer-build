apiVersion: v1
kind: Secret
metadata:
  name: seafile-secrets
  namespace: seafile
  labels:
    app.kubernetes.io/name: seafile
type: Opaque
stringData:
  jwt-private-key: "{{ secrets.seafile_jwt_private_key }}"
  admin-email: "{{ args.seafile_admin_email }}"
  admin-password: "{{ secrets.seafile_admin_password }}"
  s3-key-id: "{{ secrets.seafile_s3_key_id }}"
  s3-secret-key: "{{ secrets.seafile_s3_secret_key }}"
  oauth-client-secret: "{{ secrets.seafile_oidc_client_secret }}"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seafile-data
  namespace: seafile
  labels:
    app.kubernetes.io/name: seafile
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: "{{ args.storage_class }}"
  resources:
    requests:
      storage: {{ args.pvc_seafile }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: seafile-env
  namespace: seafile
  labels:
    app.kubernetes.io/name: seafile
data:
  SEAFILE_SERVER_HOSTNAME: "{{ args.seafile_domain }}"
  SEAFILE_SERVER_PROTOCOL: "https"
  TIME_ZONE: "{{ args.timezone }}"
  SEAFILE_MYSQL_DB_HOST: "seafile-db"
  SEAFILE_MYSQL_DB_PORT: "3306"
  SEAFILE_MYSQL_DB_USER: "seafile"
  SEAFILE_MYSQL_DB_CCNET_DB_NAME: "ccnet_db"
  SEAFILE_MYSQL_DB_SEAFILE_DB_NAME: "seafile_db"
  SEAFILE_MYSQL_DB_SEAHUB_DB_NAME: "seahub_db"
  CACHE_PROVIDER: "redis"
  REDIS_HOST: "seafile-redis"
  REDIS_PORT: "6379"
  SEAF_SERVER_STORAGE_TYPE: "s3"
  S3_COMMIT_BUCKET: "{{ args.s3_bucket_prefix }}seafile-commits"
  S3_FS_BUCKET: "{{ args.s3_bucket_prefix }}seafile-fs"
  S3_BLOCK_BUCKET: "{{ args.s3_bucket_prefix }}seafile-blocks"
  S3_HOST: "{{ args.s3_endpoint }}"
  S3_USE_HTTPS: "false"
  S3_USE_V4_SIGNATURE: "true"
  S3_PATH_STYLE_REQUEST: "true"
  S3_AWS_REGION: "{{ args.s3_region }}"
  ENABLE_NOTIFICATION_SERVER: "false"
  ENABLE_SEADOC: "false"
{% if args.auth_mode == "authelia" %}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: seafile-oauth
  namespace: seafile
  labels:
    app.kubernetes.io/name: seafile
data:
  seahub_settings_extra.py: |
    import os
    ENABLE_OAUTH = True
    OAUTH_ENABLE_INSECURE_TRANSPORT = {{ args.oidc_tls_skip_verify | default(false) | capitalize }}
    OAUTH_CLIENT_ID = "seafile"
    OAUTH_CLIENT_SECRET = os.environ.get("OAUTH_CLIENT_SECRET", "")
    OAUTH_REDIRECT_URL = "https://{{ args.seafile_domain }}/oauth/callback/"
    OAUTH_PROVIDER_DOMAIN = "{{ args.authelia_domain }}"
    OAUTH_AUTHORIZATION_URL = "https://{{ args.authelia_domain }}/api/oidc/authorization"
    OAUTH_TOKEN_URL = "https://{{ args.authelia_domain }}/api/oidc/token"
    OAUTH_USER_INFO_URL = "https://{{ args.authelia_domain }}/api/oidc/userinfo"
    OAUTH_SCOPE = ["openid", "profile", "email"]
    OAUTH_ATTRIBUTE_MAP = {
        "email": (True, "email"),
        "name": (False, "name"),
        "id": (False, "not used"),
    }
    OAUTH_CREATE_UNKNOWN_USER = True
    OAUTH_ACTIVATE_USER_AFTER_CREATION = True
    ENABLE_SIGNUP = False
{% if args.oidc_tls_skip_verify | default(false) %}
    import requests.adapters, urllib3
    urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)
    _orig_send = requests.adapters.HTTPAdapter.send
    def _no_verify_send(self, request, stream=False, timeout=None, verify=True, cert=None, proxies=None):
        return _orig_send(self, request, stream=stream, timeout=timeout, verify=False, cert=cert, proxies=proxies)
    requests.adapters.HTTPAdapter.send = _no_verify_send
{% endif %}
{% endif %}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seafile
  namespace: seafile
  labels:
    app.kubernetes.io/name: seafile
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: seafile
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seafile
    spec:
      containers:
        # renovate: datasource=docker depName=seafileltd/seafile-mc
        - name: seafile
          image: docker.io/seafileltd/seafile-mc:13.0.21
          command: ["/bin/bash", "-c"]
          args:
            - |
              pip3 install --quiet boto3 2>/dev/null || python3 -m pip install --quiet boto3
              EXTRA=/shared/seafile/conf/seahub_settings_extra.py
              MAIN=/shared/seafile/conf/seahub_settings.py
              if [ -f "$EXTRA" ] && [ -f "$MAIN" ]; then
                sed -i '/^# BEGIN OAUTH$/,/^# END OAUTH$/d' "$MAIN"
                printf '\n# BEGIN OAUTH\n' >> "$MAIN"
                cat "$EXTRA" >> "$MAIN"
                printf '# END OAUTH\n' >> "$MAIN"
              fi
              exec /sbin/my_init -- /scripts/start.py
          ports:
            - containerPort: 80
              name: http
          envFrom:
            - configMapRef:
                name: seafile-env
          env:
            - name: SEAFILE_MYSQL_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: seafile-db-password
                  key: password
            - name: INIT_SEAFILE_MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: seafile-db-root
                  key: password
            - name: JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: seafile-secrets
                  key: jwt-private-key
            - name: INIT_SEAFILE_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: seafile-secrets
                  key: admin-email
            - name: INIT_SEAFILE_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: seafile-secrets
                  key: admin-password
            - name: S3_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: seafile-secrets
                  key: s3-key-id
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: seafile-secrets
                  key: s3-secret-key
{% if args.auth_mode == "authelia" %}
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: seafile-secrets
                  key: oauth-client-secret
{% if args.oidc_tls_skip_verify | default(false) %}
            - name: CURL_CA_BUNDLE
              value: ""
{% endif %}
{% endif %}
          volumeMounts:
            - name: data
              mountPath: /shared
{% if args.auth_mode == "authelia" %}
            - name: oauth-config
              mountPath: /shared/seafile/conf/seahub_settings_extra.py
              subPath: seahub_settings_extra.py
{% endif %}
          startupProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 24
          readinessProbe:
            tcpSocket:
              port: 80
            periodSeconds: 15
          livenessProbe:
            tcpSocket:
              port: 80
            periodSeconds: 30
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: "2"
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: seafile-data
{% if args.auth_mode == "authelia" %}
        - name: oauth-config
          configMap:
            name: seafile-oauth
{% endif %}
---
apiVersion: v1
kind: Service
metadata:
  name: seafile
  namespace: seafile
  labels:
    app.kubernetes.io/name: seafile
spec:
  selector:
    app.kubernetes.io/name: seafile
  ports:
    - port: 80
      targetPort: 80
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seafile-redis
  namespace: seafile
  labels:
    app.kubernetes.io/name: seafile-redis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: seafile-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seafile-redis
    spec:
      containers:
        # renovate: datasource=docker depName=valkey/valkey
        - name: valkey
          image: docker.io/valkey/valkey:9.1.0-alpine
          ports:
            - containerPort: 6379
              name: redis
          args: ["--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru", "--save", ""]
          readinessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 96Mi
---
apiVersion: v1
kind: Service
metadata:
  name: seafile-redis
  namespace: seafile
  labels:
    app.kubernetes.io/name: seafile-redis
spec:
  selector:
    app.kubernetes.io/name: seafile-redis
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
