apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seafile
  namespace: seafile
  labels:
    app.kubernetes.io/name: seafile
  annotations:
    cert-manager.io/cluster-issuer: "{{ args.certmanager_issuer | default('cluster-issuer') }}"
    haproxy-ingress.github.io/ssl-redirect: "true"
    haproxy-ingress.github.io/proxy-body-size: "10g"
spec:
  ingressClassName: haproxy
  tls:
    - hosts:
        - "{{ args.seafile_domain }}"
      secretName: seafile-tls
  rules:
    - host: "{{ args.seafile_domain }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: seafile
                port:
                  number: 80
