{%- for ns in args.app_namespaces %}
{% if not loop.first %}
---
{% endif %}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-deployer
  namespace: {{ ns }}
subjects:
  - kind: ServiceAccount
    name: app-deployer
    namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: app-deployer
{%- endfor %}
