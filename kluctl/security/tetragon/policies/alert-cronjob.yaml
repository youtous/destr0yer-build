apiVersion: batch/v1
kind: CronJob
metadata:
  name: tetragon-alert-report
  namespace: security
  labels:
    app.kubernetes.io/name: tetragon
    app.kubernetes.io/component: alert-report
spec:
  schedule: "{{ args.schedule_tetragon_alert }}"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: tetragon
            app.kubernetes.io/component: alert-report
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            # renovate: datasource=docker depName=alpine/k8s
            - name: report
              image: docker.io/alpine/k8s@sha256:692239d739589247c4a791205ed9619c28ae85a21286e19a6211c04a62c56668  # 1.36.1
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  SINCE=$(date -u -d @$(( $(date +%s) - 86400 )) +%Y-%m-%dT%H:%M:%SZ)
                  NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

                  QUERY='{namespace="security",container="export-stdout"}'
                  ENCODED_QUERY=$(printf '%s' "$QUERY" | sed 's/{/%7B/g;s/}/%7D/g;s/"/%22/g;s/=/%3D/g;s/,/%2C/g')

                  RESULT=$(curl -sf "http://loki.observability.svc.cluster.local:3100/loki/api/v1/query_range?query=${ENCODED_QUERY}&start=${SINCE}&end=${NOW}&limit=500" || echo '{"data":{"result":[]}}')

                  EVENTS=$(echo "$RESULT" | grep -o '"process_kprobe"' | wc -l)
                  SETUID_EVENTS=$(echo "$RESULT" | grep -o '__x64_sys_setuid' | wc -l)
                  FILE_EVENTS=$(echo "$RESULT" | grep -o 'security_file_open' | wc -l)

                  if [ "$EVENTS" -eq 0 ]; then
                    echo "No security events in the last 24h — skipping report."
                    exit 0
                  fi

                  DETAILS=$(echo "$RESULT" | grep -o '"process_kprobe"[^}]*' | tail -20)

                  {
                    printf 'Subject: [Tetragon] Security events report - %s\r\n' "$(date +%Y-%m-%d)"
                    printf 'From: %s\r\n' "$SMTP_FROM"
                    printf 'To: %s\r\n' "$SMTP_TO"
                    printf 'Content-Type: text/plain; charset=utf-8\r\n'
                    printf '\r\n'
                    printf 'Tetragon Security Events Report (last 24h)\n'
                    printf '==========================================\n\n'
                    printf 'Total kprobe events: %s\n' "$EVENTS"
                    printf 'Privilege escalation (setuid 0): %s\n' "$SETUID_EVENTS"
                    printf 'Sensitive file access: %s\n\n' "$FILE_EVENTS"
                    printf '--- Details (last 20 events) ---\n%s\n\n' "$DETAILS"
                    printf '---\nCluster: {{ args.cluster_domain }}\n'
                    printf 'Generated: %s\n' "$NOW"
                  } | curl -sf --url "smtp://${SMTP_HOST}:${SMTP_PORT}" \
                      --user "${SMTP_USER}:${SMTP_PASS}" \
                      --mail-from "$SMTP_FROM" \
                      --mail-rcpt "$SMTP_TO" \
                      --upload-file -

                  echo "Report sent to ${SMTP_TO}"
              env:
                - name: SMTP_HOST
                  valueFrom:
                    secretKeyRef:
                      name: smtp-notifier
                      key: host
                - name: SMTP_PORT
                  valueFrom:
                    secretKeyRef:
                      name: smtp-notifier
                      key: port
                - name: SMTP_USER
                  valueFrom:
                    secretKeyRef:
                      name: smtp-notifier
                      key: username
                - name: SMTP_PASS
                  valueFrom:
                    secretKeyRef:
                      name: smtp-notifier
                      key: password
                - name: SMTP_FROM
                  valueFrom:
                    secretKeyRef:
                      name: smtp-notifier
                      key: from
                - name: SMTP_TO
                  value: "{{ args.admin_email }}"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
