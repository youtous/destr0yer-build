apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
spec:
  validationFailureAction: "{{ args.kyverno_validation_action }}"
  rules:
    - name: require-image-tag
      match:
        any:
          - resources:
              kinds: [Pod]
      exclude:
        any:
          - resources:
              namespaces: [kube-system, cilium, openebs, kyverno, cert-manager]
      validate:
        message: "Image tag ':latest' is not allowed."
        pattern:
          spec:
            containers:
              - image: "!*:latest"
