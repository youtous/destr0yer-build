apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: whoami
  labels:
    app.kubernetes.io/name: whoami
spec:
  replicas: {{ args.replicas_whoami }}
  selector:
    matchLabels:
      app.kubernetes.io/name: whoami
  template:
    metadata:
      labels:
        app.kubernetes.io/name: whoami
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: whoami
          # renovate: datasource=docker depName=traefik/whoami
          image: docker.io/traefik/whoami:v1.11.0
          ports:
            - containerPort: 80
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
---
apiVersion: v1
kind: Service
metadata:
  name: whoami
  namespace: whoami
  labels:
    app.kubernetes.io/name: whoami
spec:
  selector:
    app.kubernetes.io/name: whoami
  ports:
    - port: 80
      targetPort: 80
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: whoami
  namespace: whoami
  labels:
    app.kubernetes.io/name: whoami
  annotations:
    cert-manager.io/cluster-issuer: "{{ args.certmanager_issuer | default('cluster-issuer') }}"
{% if args.auth_mode == "authelia" %}
    haproxy-ingress.github.io/auth-url: "http://authelia.authelia.svc.cluster.local/api/authz/forward-auth"
    haproxy-ingress.github.io/auth-signin: "https://{{ args.authelia_domain }}/?rd=https://who.{{ args.cluster_domain }}"
    haproxy-ingress.github.io/auth-method: HEAD
    haproxy-ingress.github.io/auth-headers-request: "*"
    haproxy-ingress.github.io/auth-headers-succeed: "Remote-User,Remote-Groups,Remote-Name,Remote-Email"
    haproxy-ingress.github.io/auth-headers-fail: "-"
{% elif args.auth_mode == "basic" %}
    haproxy-ingress.github.io/auth-secret: whoami-basic-auth
    haproxy-ingress.github.io/auth-realm: Whoami
{% endif %}
spec:
  ingressClassName: haproxy
  tls:
    - hosts:
        - "who.{{ args.cluster_domain }}"
      secretName: whoami-tls
  rules:
    - host: "who.{{ args.cluster_domain }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: whoami
                port:
                  number: 80
