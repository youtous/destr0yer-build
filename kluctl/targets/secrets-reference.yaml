# Secrets reference — how to generate values for targets/<env>.enc.yaml
#
# This file is NOT encrypted and NOT deployed. It documents the expected
# secrets structure and the commands to generate each value.
#
# To create a new environment's secrets:
#   1. Copy this structure into targets/<env>.enc.yaml
#   2. Generate each value using the commands below
#   3. Encrypt: sops -e -i targets/<env>.enc.yaml
#
# To edit existing secrets (SOPS_AGE_KEY_FILE from .env):
#   just sops-edit kluctl/targets/<env>.enc.yaml

secrets:
    # ─── Authelia ────────────────────────────────────────────────────────
    # JWT signing secret (256-bit hex)
    #   openssl rand -hex 32
    authelia_jwt_secret: ""

    # Session encryption key (256-bit hex)
    #   openssl rand -hex 32
    authelia_session_key: ""

    # Storage encryption key (256-bit hex)
    #   openssl rand -hex 32
    authelia_storage_key: ""

    # Admin password hash (argon2id — the only format Authelia accepts for file-based users)
    #   docker run --rm authelia/authelia:latest authelia crypto hash generate argon2 --password 'YOUR_PASSWORD'
    # Output looks like: $argon2id$v=19$m=65536,t=3,p=4$...
    authelia_admin_password_hash: ""

    # OIDC HMAC signing secret (256-bit hex)
    #   openssl rand -hex 32
    authelia_oidc_hmac_secret: ""

    # OIDC client secret for Grafana
    # Generate both plaintext + bcrypt in one shot:
    #   PLAINTEXT=$(openssl rand -hex 16) && echo "plaintext: $PLAINTEXT" && htpasswd -nbBC 12 '' "$PLAINTEXT" | cut -d: -f2
    # Store the $2b$12$... hash in authelia_oidc_grafana_secret (Authelia config).
    # Store the PLAINTEXT in grafana_oidc_client_secret (Grafana config).
    authelia_oidc_grafana_secret: ""
    grafana_oidc_client_secret: ""

    # OIDC JWKS RSA private key (base64-encoded PEM, 4096-bit)
    # Used by Authelia to sign OIDC tokens (JWT). Must be RSA >= 2048.
    # Generate:
    #   openssl genrsa 4096 | base64 -w0
    # Verify the key decodes correctly:
    #   echo "<value>" | base64 -d | openssl rsa -check -noout
    # Extract public key (for manual JWKS verification):
    #   echo "<value>" | base64 -d | openssl rsa -pubout
    authelia_oidc_jwks_private_key_b64: ""

    # ─── CrowdSec ───────────────────────────────────────────────────────
    # Bouncer API key — must match what CrowdSec LAPI expects.
    # After deploy, register it in LAPI:
    #   just kubectl exec -n security deploy/crowdsec-lapi -- cscli bouncers add firewall -k "<KEY>"
    # Or generate and register in one step:
    #   KEY=$(openssl rand -hex 32) && echo "$KEY"
    #   just kubectl exec -n security deploy/crowdsec-lapi -- cscli bouncers add firewall -k "$KEY"
    #   → Store $KEY in SOPS as crowdsec_bouncer_key
    crowdsec_bouncer_key: ""

    # Console enrollment key (only when crowdsec_online_api: true).
    # Enables community blocklist (~15k IPs) + CrowdSec console dashboard.
    #   1. Create free account at https://app.crowdsec.net
    #   2. Go to Security Engines → "Enroll command" → Kubernetes tab
    #   3. Copy the enrollment key (reusable across installations)
    #   4. After deploy: accept enrollment in the console, then restart LAPI pod
    #   5. Subscribe to blocklists in console: Blocklist tab → Add Blocklist
    # Not needed in dev (crowdsec_online_api: false skips enrollment).
    crowdsec_enroll_key: ""

    # ─── Garage (S3 storage) ─────────────────────────────────────────────
    # Admin API token (256-bit hex)
    #   openssl rand -hex 32
    garage_admin_token: ""

    # Inter-node RPC secret (256-bit hex)
    #   openssl rand -hex 32
    garage_rpc_secret: ""

    # ─── Garage: bucket & key provisioning (manual) ──────────────────────
    #
    # All Garage admin operations use: just garage <command>
    # Full procedure: doc/operations.md → "Garage S3 administration"
    #
    # Quick reference (PREFIX = s3_bucket_prefix, includes trailing dash! e.g. "k8s-home-"):
    #   just garage key create    ${PREFIX}velero
    #   just garage bucket create ${PREFIX}velero-backups
    #   just garage bucket allow  --read --write ${PREFIX}velero-backups --key ${PREFIX}velero
    #   just garage key info ${PREFIX}velero  → note Key ID + Secret Key
    #   just sops-edit kluctl/targets/<env>.enc.yaml  → paste credentials below

    # ─── Velero (S3 backup) ───────────────────────────────────────────────
    # Garage S3 credentials for Velero — from `just garage key create ${PREFIX}velero`
    velero_s3_key_id: ""
    velero_s3_secret_key: ""

    # Kopia repository encryption password (used by Velero FSB/node-agent).
    # CRITICAL: Must be set BEFORE the first backup. Cannot be changed after.
    # Default Velero password is publicly known — always override.
    # Keep a copy outside the cluster (e.g. password manager) for DR.
    #   openssl rand -base64 32
    velero_repo_password: ""

    # ─── Grafana ─────────────────────────────────────────────────────────
    # Admin password (plaintext)
    grafana_admin_password: ""

    # ─── SMTP notifier account ──────────────────────────────────────────
    # Dedicated mailserver account for K8s service notifications.
    # Used by: Gatus, testssl, Alertmanager, Authelia, report CronJobs.
    smtp_notifier_username: ""
    smtp_notifier_password: ""

    # ─── Mailserver ──────────────────────────────────────────────────────
    # Per-domain configuration (array)
    mailserver_domains:
        - domain: example.com
          # DKIM private key (base64-encoded PEM, 2048-bit RSA)
          #   openssl genrsa 2048 | base64 -w0
          # Then publish the public key as a DNS TXT record:
          #   mail._domainkey.example.com TXT "v=DKIM1; k=rsa; p=<public_key_base64>"
          dkim_private_b64: ""
          mta_sts_mode: testing  # "testing" or "enforce"
          mta_sts_max_age: "86401"
          # Parsedmarc IMAP password (for dmarc@example.com)
          parsedmarc_password: ""
          accounts:
              - username: admin
                # Generate with: docker run --rm docker.io/mailserver/docker-mailserver:15.1.0 setup email add admin@example.com
                password_hash: ""
                quota_mb: 500
          aliases:
              - from: "postmaster@example.com"
                to: "admin@example.com"
          aliases_regexp: []
          receive_bans: []
          send_bans: []

    # ─── Seafile ─────────────────────────────────────────────────────────
    # MariaDB passwords: auto-generated by mariadb-operator (no SOPS entry needed)
    # JWT private key (>=32 chars, used for internal auth):
    #   openssl rand -hex 20
    seafile_jwt_private_key: ""
    # Admin password (first init only):
    seafile_admin_password: ""
    # Garage S3 credentials for Seafile — from `just garage key create ${PREFIX}seafile`
    # See "Garage: bucket & key provisioning" section above for full procedure.
    seafile_s3_key_id: ""
    seafile_s3_secret_key: ""
    # OIDC client secret (Seafile ↔ Authelia):
    #   1. Generate plaintext: openssl rand -hex 16
    #   2. Generate bcrypt hash: htpasswd -nbBC 12 '' "$PLAINTEXT" | cut -d: -f2
    #      Or with python: python3 -c "import bcrypt; print(bcrypt.hashpw(b'PLAINTEXT', bcrypt.gensalt(12)).decode())"
    #   3. Store plaintext in seafile_oidc_client_secret (used by Seafile)
    #   4. Store bcrypt hash ($2b$12$...) in seafile_oidc_client_secret_hash (used by Authelia)
    seafile_oidc_client_secret: ""
    seafile_oidc_client_secret_hash: ""

    # ─── Home Assistant ───────────────────────────────────────────────────
    # MariaDB passwords: auto-generated by mariadb-operator (no SOPS entry needed)
    # Garage S3 credentials for HA — from `just garage key create ${PREFIX}homeassistant`
    # Then: `garage bucket create <prefix>homeassistant-backups && garage bucket allow --read --write --key homeassistant <prefix>homeassistant-backups`
    homeassistant_s3_key_id: ""
    homeassistant_s3_secret_key: ""

    # ─── Loki S3 (prod — when loki_storage_type == "s3") ─────────────────
    # Garage S3 credentials for Loki — from `just garage key create ${PREFIX}loki`
    # Then: `garage bucket create loki-chunks && garage bucket allow --read --write --key loki loki-chunks`
    loki_s3_key_id: ""
    loki_s3_secret_key: ""

    # ─── cert-manager (prod only) ───────────────────────────────────────
    # deSEC API token for DNS-01 ACME challenge
    #   (obtain from https://desec.io/tokens)
    # desec_token: ""
