apiVersion: v1
kind: ConfigMap
metadata:
  name: gatus-config
  namespace: observability
  labels:
    app.kubernetes.io/name: gatus
    app.kubernetes.io/component: uptime-monitoring
data:
  config.yaml: |-
    metrics: true

    web:
      address: "0.0.0.0"

    ui:
      title: "K3S {{ args.environment | capitalize }} Status"
      header: "Cluster Health"
      description: "In-cluster uptime checks for {{ args.environment }} environment"

    alerting:
      email:
        from: "${SMTP_FROM}"
        host: "${SMTP_HOST}"
        port: ${SMTP_PORT}
        username: "${SMTP_USER}"
        password: "${SMTP_PASS}"
        to: "{{ args.admin_email }}"

    endpoints:
{% for ep in args.gatus_endpoints %}
      - name: "{{ ep.name }}"
        group: "{{ ep.group }}"
        url: "{{ ep.url }}"
        interval: {{ ep.interval | default("120s") }}
{% if ep.dns is defined %}
        dns:
          query-name: "{{ ep.dns['query-name'] }}"
          query-type: "{{ ep.dns['query-type'] }}"
{% endif %}
{% if ep.dns is not defined %}
        client:
          insecure: {{ ep.insecure | default(true) }}
          timeout: {{ ep.timeout | default("10s") }}
{% endif %}
        conditions:
{% for cond in ep.conditions %}
          - '{{ cond }}'
{% endfor %}
        alerts:
          - type: email
            description: "{{ ep.name }} check failed"
            send-on-resolved: true
{% endfor %}
