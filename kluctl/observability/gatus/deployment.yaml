apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatus
  namespace: observability
  labels:
    app.kubernetes.io/name: gatus
    app.kubernetes.io/component: uptime-monitoring
spec:
  replicas: {{ args.replicas_gatus }}
  selector:
    matchLabels:
      app.kubernetes.io/name: gatus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gatus
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        # renovate: datasource=docker depName=twin/gatus versioning=semver
        - name: gatus
          image: ghcr.io/twin/gatus:v5.36.0
          imagePullPolicy: IfNotPresent
          env:
            - name: GATUS_CONFIG_PATH
              value: /config/config.yaml
            - name: PORT
              value: "8080"
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: smtp-notifier
                  key: host
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: smtp-notifier
                  key: port
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: smtp-notifier
                  key: username
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: smtp-notifier
                  key: password
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: smtp-notifier
                  key: from
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: config
          configMap:
            name: gatus-config
        - name: tmp
          emptyDir: {}
