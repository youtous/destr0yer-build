apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gatus
  namespace: observability
  labels:
    app.kubernetes.io/name: gatus
    app.kubernetes.io/component: uptime-monitoring
  annotations:
    cert-manager.io/cluster-issuer: "{{ args.certmanager_issuer | default('cluster-issuer') }}"
{% if args.auth_mode == "authelia" %}
    haproxy-ingress.github.io/auth-url: "http://authelia.authelia.svc.cluster.local/api/authz/forward-auth"
    haproxy-ingress.github.io/auth-signin: "https://{{ args.authelia_domain }}/?rd=https://status.{{ args.cluster_domain }}"
    haproxy-ingress.github.io/auth-method: HEAD
    haproxy-ingress.github.io/auth-headers-request: "*"
    haproxy-ingress.github.io/auth-headers-succeed: "Remote-User,Remote-Groups,Remote-Name,Remote-Email"
    haproxy-ingress.github.io/auth-headers-fail: "-"
{% elif args.auth_mode == "basic" %}
    haproxy-ingress.github.io/auth-secret: gatus-basic-auth
    haproxy-ingress.github.io/auth-realm: "Gatus Status"
{% endif %}
spec:
  ingressClassName: haproxy
  tls:
    - hosts:
        - "status.{{ args.cluster_domain }}"
      secretName: gatus-tls
  rules:
    - host: "status.{{ args.cluster_domain }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gatus
                port:
                  number: 8080
