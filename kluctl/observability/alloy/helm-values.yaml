alloy:
  configMap:
    content: |
      // ====================================================================
      // Logs: pod logs via K8s discovery → file tailing → Loki
      // ====================================================================

      discovery.kubernetes "pods" {
        role = "pod"

        selectors {
          role  = "pod"
          field = "spec.nodeName=" + coalesce(sys.env("HOSTNAME"), constants.hostname)
        }
      }

      discovery.relabel "pods" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label  = "node"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          target_label  = "app"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
          target_label  = "__path__"
          separator     = "/"
          replacement   = "/var/log/pods/*$1/*.log"
        }
      }

      local.file_match "pods" {
        path_targets = discovery.relabel.pods.output
      }

      loki.source.file "pods" {
        targets    = local.file_match.pods.targets
        forward_to = [loki.process.pods.receiver]
      }

      loki.process "pods" {
        stage.cri {}
        forward_to = [loki.write.default.receiver]
      }

      loki.write "default" {
        endpoint {
          url = "http://loki.observability.svc:3100/loki/api/v1/push"
        }
        external_labels = {
          cluster = "{{ args.environment }}",
          source  = "kubernetes",
        }
      }

      // ====================================================================
      // Logs: K3S API server audit log (JSON) → Loki
      // Only exists on control-plane nodes; workers have no file (harmless).
      // ====================================================================

      local.file_match "k3s_audit" {
        path_targets = [{
          __path__ = "/var/lib/rancher/k3s/server/logs/audit.log",
          job      = "k8s-audit",
        }]
      }

      loki.source.file "k3s_audit" {
        targets    = local.file_match.k3s_audit.targets
        forward_to = [loki.process.k3s_audit.receiver]
      }

      loki.process "k3s_audit" {
        stage.json {
          expressions = {
            level       = "level",
            verb        = "verb",
            user        = "user.username",
            resource    = "objectRef.resource",
            namespace   = "objectRef.namespace",
            api_group   = "objectRef.apiGroup",
            status_code = "responseStatus.code",
          }
        }

        stage.labels {
          values = {
            level     = "",
            verb      = "",
            user      = "",
            resource  = "",
            namespace = "",
          }
        }

        forward_to = [loki.write.default.receiver]
      }

      // ====================================================================
      // Metrics: kubelet + kube-state-metrics → Prometheus remote_write
      // ====================================================================

      // Discover K8s nodes for kubelet scraping
      discovery.kubernetes "nodes" {
        role = "node"
      }

      // Kubelet metrics (/metrics)
      discovery.relabel "kubelet" {
        targets = discovery.kubernetes.nodes.targets

        rule {
          target_label = "__address__"
          replacement  = "kubernetes.default.svc:443"
        }
        rule {
          source_labels = ["__meta_kubernetes_node_name"]
          regex         = "(.+)"
          target_label  = "__metrics_path__"
          replacement   = "/api/v1/nodes/$1/proxy/metrics"
        }
        rule {
          source_labels = ["__meta_kubernetes_node_name"]
          target_label  = "node"
        }
      }

      prometheus.scrape "kubelet" {
        targets         = discovery.relabel.kubelet.output
        forward_to      = [prometheus.remote_write.default.receiver]
        scheme          = "https"
        scrape_interval = "30s"
        job_name        = "kubelet"

        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        tls_config {
          ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
          insecure_skip_verify = false
        }
      }

      // cAdvisor metrics (built into kubelet at /metrics/cadvisor)
      discovery.relabel "cadvisor" {
        targets = discovery.kubernetes.nodes.targets

        rule {
          target_label = "__address__"
          replacement  = "kubernetes.default.svc:443"
        }
        rule {
          source_labels = ["__meta_kubernetes_node_name"]
          regex         = "(.+)"
          target_label  = "__metrics_path__"
          replacement   = "/api/v1/nodes/$1/proxy/metrics/cadvisor"
        }
        rule {
          source_labels = ["__meta_kubernetes_node_name"]
          target_label  = "node"
        }
      }

      prometheus.scrape "cadvisor" {
        targets         = discovery.relabel.cadvisor.output
        forward_to      = [prometheus.remote_write.default.receiver]
        scheme          = "https"
        scrape_interval = "30s"
        job_name        = "cadvisor"

        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        tls_config {
          ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
          insecure_skip_verify = false
        }
      }

      // kube-state-metrics (deployed by kube-prometheus-stack)
      discovery.kubernetes "kube_state_metrics" {
        role = "endpoints"

        namespaces {
          names = ["observability"]
        }
      }

      discovery.relabel "kube_state_metrics" {
        targets = discovery.kubernetes.kube_state_metrics.targets

        rule {
          source_labels = ["__meta_kubernetes_service_label_app_kubernetes_io_name"]
          regex         = "kube-state-metrics"
          action        = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_endpoint_port_name"]
          regex         = "http"
          action        = "keep"
        }
      }

      prometheus.scrape "kube_state_metrics" {
        targets         = discovery.relabel.kube_state_metrics.output
        forward_to      = [prometheus.remote_write.default.receiver]
        scrape_interval = "30s"
        job_name        = "kube-state-metrics"
      }

      // Remote write to Prometheus
      prometheus.remote_write "default" {
        endpoint {
          url = "http://promgraf-kube-prometheus-prometheus.observability.svc:9090/api/v1/write"
        }
      }

      // ====================================================================
      // Optional: standalone cAdvisor (uncomment only if kubelet cAdvisor
      // metrics at /metrics/cadvisor are insufficient for dashboards/alerts)
      // ====================================================================
      //
      // discovery.kubernetes "cadvisor_standalone" {
      //   role = "endpoints"
      //   namespaces {
      //     names = ["observability"]
      //   }
      // }
      //
      // discovery.relabel "cadvisor_standalone" {
      //   targets = discovery.kubernetes.cadvisor_standalone.targets
      //   rule {
      //     source_labels = ["__meta_kubernetes_service_label_app"]
      //     regex         = "cadvisor"
      //     action        = "keep"
      //   }
      // }
      //
      // prometheus.scrape "cadvisor_standalone" {
      //   targets    = discovery.relabel.cadvisor_standalone.output
      //   forward_to = [prometheus.remote_write.default.receiver]
      //   job_name   = "cadvisor-standalone"
      // }

  securityContext:
    runAsUser: 0
    runAsGroup: 0

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  mounts:
    varlog: true
    extra:
      - name: k3s-audit-logs
        mountPath: /var/lib/rancher/k3s/server/logs
        readOnly: true

configReloader:
  resources:
    requests:
      cpu: 10m
      memory: 50Mi
    limits:
      cpu: 100m
      memory: 128Mi
  securityContext:
    runAsUser: 65534
    runAsGroup: 65534
    runAsNonRoot: true

global:
  podSecurityContext:
    runAsNonRoot: false

controller:
  type: daemonset
  volumes:
    extra:
      - name: k3s-audit-logs
        hostPath:
          path: /var/lib/rancher/k3s/server/logs
          type: DirectoryOrCreate

serviceAccount:
  create: true

rbac:
  create: true
