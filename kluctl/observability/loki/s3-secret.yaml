{% if args.loki_storage_type == "s3" %}
apiVersion: v1
kind: Secret
metadata:
  name: loki-s3-credentials
  namespace: observability
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/component: storage
type: Opaque
stringData:
  S3_ACCESS_KEY_ID: "{{ secrets.loki_s3_key_id | default('') }}"
  S3_SECRET_ACCESS_KEY: "{{ secrets.loki_s3_secret_key | default('') }}"
{% else %}
# S3 storage disabled (loki_storage_type != "s3") — no secret needed
{% endif %}
