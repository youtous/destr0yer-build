# SOPS secrets required — see targets/secrets-reference.yaml for generation instructions.
# Authelia secrets: authelia_jwt_secret, authelia_session_key, authelia_storage_key,
# authelia_admin_password_hash, authelia_oidc_hmac_secret, authelia_oidc_grafana_secret,
# authelia_oidc_jwks_private_key_b64, seafile_oidc_client_secret_hash (if enable_seafile)
ingress:
  enabled: true
  annotations:
    haproxy-ingress.github.io/ssl-redirect: "false"
    cert-manager.io/cluster-issuer: "{{ args.certmanager_issuer | default('cluster-issuer') }}"
  className: haproxy
  tls:
    enabled: true
    secret: authelia-tls

pod:
  kind: Deployment
  replicas: {{ args.replicas_authelia }}
  priorityClassName: cluster-infra
  securityContext:
    container:
      runAsUser: 2000
      runAsGroup: 2000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop: ["ALL"]
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi
  extraVolumeMounts:
    - name: users-database
      mountPath: /config/users_database.yml
      subPath: users_database.yml
      readOnly: true
  extraVolumes:
    - name: users-database
      secret:
        secretName: authelia-users

persistence:
  enabled: true
  storageClass: "{{ args.storage_class }}"
  size: 128Mi

secret:
  disabled: false

configMap:
  ntp:
    disable_failure: true
    disable_startup_check: true
  log:
    level: info
    format: json
  server:
    endpoints:
      automatic_authz_implementations:
        - ForwardAuth
  regulation:
    modes:
      - user
      - ip
    max_retries: 3
    find_time: 2m
    ban_time: 10m
  identity_validation:
    reset_password:
      secret:
        value: "{{ secrets.authelia_jwt_secret }}"
  authentication_backend:
    file:
      enabled: true
  session:
    encryption_key:
      value: "{{ secrets.authelia_session_key }}"
    remember_me: 1M
    cookies:
      - domain: "{{ args.cluster_domain }}"
        subdomain: auth
        expiration: 1h
        inactivity: 5m
  storage:
    encryption_key:
      value: "{{ secrets.authelia_storage_key }}"
    local:
      enabled: true
      path: /config/db.sqlite3
  notifier:
    disable_startup_check: {{ args.authelia_notifier_disable_startup_check | default(false) }}
    smtp:
      enabled: true
      address: "{{ args.authelia_smtp_scheme | default('submissions') }}://{{ args.smtp_notifier_host }}:{{ args.smtp_notifier_port }}"
      timeout: "15 seconds"
      sender: "{{ args.authelia_sender_email }}"
      disable_require_tls: {{ args.authelia_smtp_disable_require_tls | default(false) }}
      disable_starttls: {{ args.authelia_smtp_disable_starttls | default(false) }}
      tls:
        skip_verify: {{ args.authelia_smtp_tls_skip_verify | default(false) }}
      password:
        disabled: {{ args.authelia_smtp_password_disabled | default(false) }}
    filesystem:
      enabled: false
  access_control:
    default_policy: two_factor
  identity_providers:
    oidc:
      enabled: true
      hmac_secret:
        value: "{{ secrets.authelia_oidc_hmac_secret }}"
      jwks:
        - key_id: authelia
          algorithm: RS256
          use: sig
          key:
            value: |
              {{ secrets.authelia_oidc_jwks_private_key_b64 | b64decode | indent(14) }}
      clients:
        - client_id: grafana
          client_name: Grafana
          client_secret:
            value: "{{ secrets.authelia_oidc_grafana_secret }}"
          token_endpoint_auth_method: client_secret_basic
          redirect_uris:
            - "https://{{ args.grafana_domain }}/login/generic_oauth"
          scopes:
            - openid
            - profile
            - email
            - groups
{% if args.enable_homeassistant | default(false) %}
        - client_id: homeassistant
          client_name: Home Assistant
          public: true
          require_pkce: true
          pkce_challenge_method: S256
          redirect_uris:
            - "https://ha.{{ args.cluster_domain }}/auth/oidc/callback"
          scopes:
            - openid
            - profile
            - email
            - groups
{% endif %}
{% if args.enable_seafile | default(false) %}
        - client_id: seafile
          client_name: Seafile
          client_secret:
            value: "{{ secrets.seafile_oidc_client_secret_hash }}"
          redirect_uris:
            - "https://{{ args.seafile_domain }}/oauth/callback/"
          scopes:
            - openid
            - profile
            - email
{% endif %}
