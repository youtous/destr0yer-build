apiVersion: v1
kind: Secret
metadata:
  name: homeassistant-db-backup-s3
  namespace: homeassistant
  labels:
    app.kubernetes.io/name: mariadb
    app.kubernetes.io/part-of: homeassistant
type: Opaque
stringData:
  access-key-id: "{{ secrets.homeassistant_s3_key_id }}"
  secret-access-key: "{{ secrets.homeassistant_s3_secret_key }}"
---
apiVersion: k8s.mariadb.com/v1alpha1
kind: MariaDB
metadata:
  name: homeassistant-db
  namespace: homeassistant
  labels:
    app.kubernetes.io/name: mariadb
    app.kubernetes.io/part-of: homeassistant
spec:
  # Passwords auto-generated by operator into:
  #   root: homeassistant-db-root (key: password)
  #   user: homeassistant-db-password (key: password)
  rootPasswordSecretKeyRef:
    name: homeassistant-db-root
    key: password
    generate: true
  passwordSecretKeyRef:
    name: homeassistant-db-password
    key: password
    generate: true

  podMetadata:
    annotations:
      backup.velero.io/backup-volumes-excludes: storage

  # renovate: datasource=docker depName=library/mariadb versioning=docker
  image: docker.io/library/mariadb:11.8

  port: 3306

  database: homeassistant
  username: homeassistant

  storage:
    size: {{ args.pvc_mariadb }}
    storageClassName: "{{ args.storage_class }}"

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

  myCnf: |
    [mariadb]
    bind-address=*
    default_storage_engine=InnoDB
    binlog_format=row
    innodb_autoinc_lock_mode=2
    innodb_buffer_pool_size=64M
    max_allowed_packet=64M
    character-set-server=utf8mb4
    collation-server=utf8mb4_unicode_ci

  connection:
    healthCheck:
      interval: 10s
      retryInterval: 5s

  metrics:
    enabled: {{ args.mariadb_operator_metrics | default(false) }}
---
apiVersion: k8s.mariadb.com/v1alpha1
kind: Grant
metadata:
  name: homeassistant-grants
  namespace: homeassistant
spec:
  mariaDbRef:
    name: homeassistant-db
  privileges:
    - ALL PRIVILEGES
  database: "homeassistant"
  table: "*"
  username: homeassistant
  grantOption: false
---
apiVersion: k8s.mariadb.com/v1alpha1
kind: Backup
metadata:
  name: homeassistant-db-backup
  namespace: homeassistant
  labels:
    app.kubernetes.io/name: mariadb
    app.kubernetes.io/part-of: homeassistant
spec:
  mariaDbRef:
    name: homeassistant-db
  schedule:
    cron: "{{ args.schedule_ha_mariadb_backup }}"
    suspend: false
  maxRetention: "87600h"
  databases:
    - homeassistant
  storage:
    s3:
      bucket: "{{ args.s3_bucket_prefix }}homeassistant-backups"
      prefix: mariadb
      endpoint: "{{ args.s3_endpoint }}"
      region: "{{ args.s3_region }}"
      accessKeyIdSecretKeyRef:
        name: homeassistant-db-backup-s3
        key: access-key-id
      secretAccessKeySecretKeyRef:
        name: homeassistant-db-backup-s3
        key: secret-access-key
      tls:
        enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
