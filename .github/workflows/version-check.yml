name: Version Check

on:
  schedule:
    - cron: "0 8 * * 1"  # Every Monday at 08:00 UTC
  workflow_dispatch: {}

permissions:
  issues: write

jobs:
  check-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install tools
        run: |
          # yq
          YQ_VERSION="v4.52.5"
          curl -sSLo /usr/local/bin/yq \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          chmod +x /usr/local/bin/yq

          # crane
          CRANE_VERSION="v0.21.0"
          curl -sSL "https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz" \
            | tar xz -C /usr/local/bin crane
          chmod +x /usr/local/bin/crane

          # helm
          curl -sSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Run version check
        id: check
        run: |
          set +e
          OUTPUT=$(./scripts/check-versions.sh --check-updates 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" > /tmp/version-report.txt

          UPDATES=$(echo "$OUTPUT" | grep -c '\->' || true)
          echo "update_count=$UPDATES" >> "$GITHUB_OUTPUT"

      - name: Read CODEOWNERS
        if: steps.check.outputs.update_count > 0
        id: maintainers
        run: |
          MENTIONS=$(grep -oE '@[a-zA-Z0-9_-]+' .github/CODEOWNERS | sort -u | tr '\n' ' ')
          echo "mentions=$MENTIONS" >> "$GITHUB_OUTPUT"

      - name: Create or update issue
        if: steps.check.outputs.update_count > 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |-
          UPDATES="${{ steps.check.outputs.update_count }}"
          MAINTAINERS="${{ steps.maintainers.outputs.mentions }}"
          DATE=$(date -u +%Y-%m-%d)

          REPORT=$(cat /tmp/version-report.txt \
            | sed 's/\x1b\[[0-9;]*m//g' \
            | grep '\->' \
            | sed 's/^/| /' \
            | sed 's/ *-> */ | /' \
            | sed 's/$/ |/')

          BODY=$(cat <<EOF
          ## Weekly Version Check — ${DATE}

          **${UPDATES} updates available.** cc ${MAINTAINERS}

          | Component | Current | Available |
          |-----------|---------|-----------|
          ${REPORT}

          ---
          _Auto-generated by [version-check.yml](.github/workflows/version-check.yml). Run \`./scripts/check-versions.sh --check-updates\` locally for full details._
          EOF
          )

          EXISTING=$(gh issue list --label "version-check" --state open --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create \
              --title "Version updates available (${DATE})" \
              --body "$BODY" \
              --label "version-check,dependencies"
          fi
