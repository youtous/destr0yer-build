name: Lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version-file: '.tool-versions'

      - name: Install pipenv
        run: pip install pipenv

      - name: Install dependencies
        run: pipenv install --dev

      - name: Run pre-commit
        env:
          VAULT_PASSWORD: "ci-dummy-password"
        run: pipenv run pre-commit run --all-files --show-diff-on-failure

  kluctl-render:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install kluctl
        run: curl -sSL https://kluctl.io/install.sh | bash

      - name: Install SOPS
        run: |
          SOPS_VERSION="3.9.4"
          curl -sSLo /usr/local/bin/sops \
            "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64"
          chmod +x /usr/local/bin/sops

      - name: Check SOPS key availability
        id: sops-check
        run: |
          if [ -n "${{ secrets.SOPS_AGE_KEY }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SOPS_AGE_KEY secret not configured — skipping kluctl render"
          fi

      - name: Render dev target
        if: steps.sops-check.outputs.available == 'true'
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: kluctl render -t dev --project-dir kluctl/ --offline-kubernetes --kubernetes-version 1.36
