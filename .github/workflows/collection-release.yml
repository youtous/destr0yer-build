name: Collection Release

on:
  push:
    tags:
      - "collection-v*"

permissions:
  contents: write

env:
  COLLECTION_PATH: collections/ansible_collections/youtous/destr0yer

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.14"

      - name: Install ansible-core
        run: pip install ansible-core

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#collection-v}" >> "$GITHUB_OUTPUT"

      - name: Verify galaxy.yml version matches tag
        run: |
          GALAXY_VERSION=$(python3 -c "import yaml; print(yaml.safe_load(open('${{ env.COLLECTION_PATH }}/galaxy.yml'))['version'])")
          if [ "$GALAXY_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::galaxy.yml version ($GALAXY_VERSION) does not match tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Build collection artifact
        run: ansible-galaxy collection build "${{ env.COLLECTION_PATH }}" --output-path build/

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: collection-artifact
          path: build/youtous-destr0yer-*.tar.gz

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
        with:
          files: build/youtous-destr0yer-*.tar.gz
          body: |
            ## Ansible Collection `youtous.destr0yer` v${{ steps.version.outputs.version }}

            Install from this release:
            ```
            ansible-galaxy collection install youtous-destr0yer-${{ steps.version.outputs.version }}.tar.gz
            ```

  publish-galaxy:
    needs: build
    runs-on: ubuntu-latest
    if: vars.PUBLISH_TO_GALAXY == 'true'
    steps:
      - name: Download artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: collection-artifact
          path: build/

      - name: Install ansible-core
        run: pip install ansible-core

      - name: Publish to Ansible Galaxy
        run: ansible-galaxy collection publish build/youtous-destr0yer-*.tar.gz --api-key "${{ secrets.GALAXY_API_KEY }}"
