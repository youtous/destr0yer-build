# SOPS configuration for encrypting Kluctl secrets with age.
#
# Key path: .keys/<env>-sops.age (set via SOPS_AGE_KEY_FILE in .env)
#
# Setup:
#   1. just sops-init          — generates age keypair at $SOPS_AGE_KEY_FILE
#   2. Copy the public key below (replace the placeholder)
#   3. Ensure SOPS_AGE_KEY_FILE is set in .env (see .env.sample)
#   4. Store the private key in vault:
#        just vault-encrypt secret_vars/<env>/sops-age-key.yml
#
# On a new machine:
#   just sops-unlock            — extracts the key from vault into $SOPS_AGE_KEY_FILE

creation_rules:
  - path_regex: ^kluctl/.*\.enc\.yaml$
    age: "age13u685ul92gp4k55vj0m2aadnjteghgthyjz0x59la3rz8kka7c3sq79j22"
