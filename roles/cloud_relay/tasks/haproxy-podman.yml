- name: Create HAProxy rootless user
  become: true
  ansible.builtin.user:
    name: "{{ relay_haproxy_user }}"
    uid: "{{ relay_haproxy_uid }}"
    system: true
    create_home: true
    home: "/home/{{ relay_haproxy_user }}"
    shell: /usr/sbin/nologin
    comment: "HAProxy relay (Podman rootless)"

- name: Configure subuid for rootless Podman
  become: true
  ansible.builtin.lineinfile:
    path: /etc/subuid
    regexp: "^{{ relay_haproxy_user }}:"
    line: "{{ relay_haproxy_user }}:200000:65536"
    create: true
    owner: root
    group: root
    mode: "u=rw,g=r,o=r"

- name: Configure subgid for rootless Podman
  become: true
  ansible.builtin.lineinfile:
    path: /etc/subgid
    regexp: "^{{ relay_haproxy_user }}:"
    line: "{{ relay_haproxy_user }}:200000:65536"
    create: true
    owner: root
    group: root
    mode: "u=rw,g=r,o=r"

- name: Enable lingering for boot persistence
  become: true
  ansible.builtin.command:
    cmd: "loginctl enable-linger {{ relay_haproxy_user }}"
    creates: "/var/lib/systemd/linger/{{ relay_haproxy_user }}"

- name: Create HAProxy config directory
  become: true
  ansible.builtin.file:
    path: "{{ relay_haproxy_config_dir }}"
    state: directory
    owner: "{{ relay_haproxy_user }}"
    group: "{{ relay_haproxy_user }}"
    mode: "u=rwx,g=rx,o="

- name: Deploy HAProxy config
  become: true
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: "{{ relay_haproxy_config_dir }}/haproxy.cfg"
    owner: "{{ relay_haproxy_user }}"
    group: "{{ relay_haproxy_user }}"
    mode: "u=rw,g=r,o="
  notify: Restart HAProxy container

- name: Ensure Quadlet directory exists
  become: true
  ansible.builtin.file:
    path: "{{ relay_haproxy_quadlet_dir }}"
    state: directory
    owner: "{{ relay_haproxy_user }}"
    group: "{{ relay_haproxy_user }}"
    mode: "u=rwx,g=,o="

- name: Deploy HAProxy Quadlet unit
  become: true
  ansible.builtin.template:
    src: haproxy-podman.service.j2
    dest: "{{ relay_haproxy_quadlet_dir }}/haproxy-relay.container"
    owner: "{{ relay_haproxy_user }}"
    group: "{{ relay_haproxy_user }}"
    mode: "u=rw,g=r,o="
  notify: Restart HAProxy container

- name: Reload systemd user daemon
  become: true
  become_user: "{{ relay_haproxy_user }}"
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ relay_haproxy_uid }}"

- name: Enable and start HAProxy container service
  become: true
  become_user: "{{ relay_haproxy_user }}"
  ansible.builtin.systemd:
    name: haproxy-relay
    enabled: true
    state: started
    scope: user
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ relay_haproxy_uid }}"
