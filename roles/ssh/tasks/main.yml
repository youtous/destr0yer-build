# This role contains OpenSSH settings
- name: Install openssh packages
  become: true
  ansible.builtin.apt:
    name:
      - openssh-client
      - openssh-server

- name: Ensure files for weak algorithms are not present
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  with_items: "{{ algorithms_files_to_remove }}"

- name: Checking if keys has been regenerated
  ansible.builtin.stat:
    path: "{{ key_generated_flag_file }}"
  register: flag_keys_generated

- name: Remove old host keys
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  with_items:
    - /etc/ssh/ssh_host_ed25519_key
    - /etc/ssh/ssh_host_rsa_key
  when: not flag_keys_generated.stat.exists

- name: Generate ed25519 host key
  become: true
  community.crypto.openssh_keypair:
    path: /etc/ssh/ssh_host_ed25519_key
    type: ed25519
    owner: root
    group: root
    mode: u=rw,g=,o=
  when: not flag_keys_generated.stat.exists

- name: Generate rsa host key
  become: true
  community.crypto.openssh_keypair:
    path: /etc/ssh/ssh_host_rsa_key
    type: rsa
    size: "{{ rsa_key_size }}"
    owner: root
    group: root
    mode: u=rw,g=,o=
  when: not flag_keys_generated.stat.exists

- name: Lock host keys
  become: true
  ansible.builtin.copy:
    content: ""
    dest: "{{ key_generated_flag_file }}"
    force: false
    group: root
    owner: root
    mode: u=rw,g=r,o=r

- name: Copy issue banners
  become: true
  ansible.builtin.copy:
    src: "files/{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: u=rw,g=r,o=r
  notify:
    - Restart sshd
  with_items:
    - {src: issue, dest: /etc/issue}
    - {src: issue, dest: /etc/issue.net,}

- name: Copy sshd server configuration
  become: true
  ansible.builtin.template:
    src: templates/sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: u=rw,g=,o=
    validate: /usr/sbin/sshd -T -f %s
  notify:
    - Restart sshd

- name: "Configure sshd port in /etc/services : {{ sshd_port }}"
  become: true
  ansible.builtin.lineinfile:
    dest: "/etc/services"
    regexp: "^ssh"
    line: "ssh\t\t{{ sshd_port }}/tcp\t\t\t\t# SSH Remote Login Protocol"  # noqa no-tabs

- name: Enable OpenSSH server
  become: true
  ansible.builtin.service:
    name: sshd
    state: started
    enabled: true

- name: Copy ssh client configuration
  become: true
  ansible.builtin.template:
    src: templates/ssh_config.j2
    dest: /etc/ssh/ssh_config
    owner: root
    group: root
    mode: u=rw,g=r,o=r

- name: Enable OpenSSH client
  become: true
  ansible.builtin.service:
    name: ssh
    enabled: true
