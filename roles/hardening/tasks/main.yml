# This role is hardening linux kernel values. Based on https://github.com/dev-sec/ansible-os-hardening

- name: Limits
  ansible.builtin.import_tasks: limits.yml
  become: true

- name: Login def
  ansible.builtin.import_tasks: login_defs.yml
  become: true

- name: Apt
  ansible.builtin.import_tasks: apt.yml
  become: true

- name: Modprobe
  ansible.builtin.import_tasks: modprobe.yml
  become: true

- name: Sysctl
  ansible.builtin.import_tasks: sysctl.yml
  become: true

- name: File permissions
  ansible.builtin.import_tasks: file_permissions.yml
  become: true

- name: Umask
  ansible.builtin.import_tasks: umask.yml
  become: true

- name: Debsums integrity check timer
  ansible.builtin.import_tasks: debsums.yml
  when: debsums_check_enabled | bool

- name: Lynis audit timer
  ansible.builtin.import_tasks: lynis.yml
  when: lynis_audit_enabled | bool
