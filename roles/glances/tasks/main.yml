- name: Install glances and dependencies
  become: true
  ansible.builtin.apt:
    name:
      - glances
      - python3-psutil
      - python3-jinja2
      - lm-sensors
    state: present

- name: Create glances systemd override directory
  become: true
  ansible.builtin.file:
    path: /etc/systemd/system/glances.service.d
    state: directory
    owner: root
    group: root
    mode: "u=rwx,g=rx,o=rx"

- name: Deploy glances hardening override
  become: true
  ansible.builtin.copy:
    dest: /etc/systemd/system/glances.service.d/hardening.conf
    content: |
      [Service]
      NoNewPrivileges=true
      PrivateDevices=true
      PrivateTmp=true
      ProtectHome=yes
      ProtectKernelTunables=true
      ProtectKernelModules=true
      ProtectKernelLogs=true
      ProtectControlGroups=true
      ProtectHostname=true
      ProtectClock=true
      RestrictAddressFamilies=AF_UNIX AF_INET AF_INET6
      RestrictNamespaces=true
      RestrictRealtime=true
      RestrictSUIDSGID=true
      LockPersonality=true
    owner: root
    group: root
    mode: "u=rw,g=r,o=r"
  notify: Reload glances systemd

- name: Reload systemd after glances override
  become: true
  ansible.builtin.systemd:
    daemon_reload: true
