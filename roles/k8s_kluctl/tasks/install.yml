- name: Create build directory
  ansible.builtin.tempfile:
    state: directory
    suffix: build
    path: "{{ ansible_env.HOME }}/.ansible/tmp"
  register: tmp_dir_build

- name: Download kluctl checksums
  ansible.builtin.get_url:
    url: "{{ k8s_kluctl_checksum_url }}"
    dest: "{{ tmp_dir_build.path }}/checksums.txt"
    mode: "u=rw,g=,o="

- name: Extract expected checksum for kluctl archive
  ansible.builtin.shell:
    cmd: >
      set -o pipefail && grep '{{ k8s_kluctl_archive_name }}' {{ tmp_dir_build.path }}/checksums.txt | awk '{print $1}'
    executable: /bin/bash
  changed_when: false
  register: k8s_kluctl_expected_checksum

- name: Download kluctl release and verify checksum
  ansible.builtin.get_url:
    url: "{{ k8s_kluctl_download_url }}"
    dest: "{{ tmp_dir_build.path }}/{{ k8s_kluctl_archive_name }}"
    checksum: "sha256:{{ k8s_kluctl_expected_checksum.stdout }}"
    mode: "u=rw,g=,o="

- name: Extract downloaded release
  ansible.builtin.unarchive:
    src: "{{ tmp_dir_build.path }}/{{ k8s_kluctl_archive_name }}"
    dest: "{{ tmp_dir_build.path }}"
    remote_src: true

- name: Copy kluctl binary
  become: true
  ansible.builtin.copy:
    remote_src: true
    src: "{{ tmp_dir_build.path }}/kluctl"
    dest: "{{ k8s_kluctl_path }}"
    owner: root
    group: root
    mode: u=rwx,g=rx,o=rx

- name: Remove the temporary build directory
  ansible.builtin.file:
    path: "{{ tmp_dir_build.path }}"
    state: absent
