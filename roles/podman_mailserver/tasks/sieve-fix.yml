- name: Fix Sieve symlinks pointing to old v10 path
  become: true
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      for domaindir in {{ podman_mailserver_home }}/mail-data/*/; do
        [ -d "$domaindir" ] || continue
        for userdir in "$domaindir"*/; do
          [ -d "$userdir" ] || continue
          dovecot_sieve="$userdir/.dovecot.sieve"
          if [ -L "$dovecot_sieve" ]; then
            target=$(readlink "$dovecot_sieve")
            case "$target" in
              sieve/*)
                new_target="home/${target}"
                ln -sf "$new_target" "$dovecot_sieve"
                rm -f "$userdir/.dovecot.svbin"
                echo "fixed: $dovecot_sieve -> $new_target"
                ;;
            esac
          fi
        done
      done
      echo "done"
    executable: /bin/bash
  register: _sieve_fix
  changed_when: "'fixed:' in _sieve_fix.stdout"

- name: Fix ownership of modified Sieve files
  become: true
  become_user: "{{ podman_mailserver_user }}"
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      MAIL_UID=$(podman run --rm \
        {{ podman_mailserver_image }}:{{ podman_mailserver_version }}@{{ podman_mailserver_digest }} \
        id -u docker)
      MAIL_GID=$(podman run --rm \
        {{ podman_mailserver_image }}:{{ podman_mailserver_version }}@{{ podman_mailserver_digest }} \
        id -g docker)
      podman unshare chown -R "${MAIL_UID}:${MAIL_GID}" {{ podman_mailserver_home }}/mail-data/
    executable: /bin/bash
  environment:
    XDG_RUNTIME_DIR: "{{ podman_mailserver_xdg_runtime_dir }}"
  changed_when: true
