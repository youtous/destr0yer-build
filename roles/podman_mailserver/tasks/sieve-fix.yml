- name: Fix Sieve symlinks pointing to old v10 path
  become: true
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      for domaindir in {{ podman_mailserver_home }}/mail-data/*/; do
        [ -d "$domaindir" ] || continue
        for userdir in "$domaindir"*/; do
          [ -d "$userdir" ] || continue
          dovecot_sieve="$userdir/.dovecot.sieve"
          if [ -L "$dovecot_sieve" ]; then
            target=$(readlink "$dovecot_sieve")
            case "$target" in
              sieve/*)
                new_target="home/${target}"
                ln -sf "$new_target" "$dovecot_sieve"
                rm -f "$userdir/.dovecot.svbin"
                echo "fixed: $dovecot_sieve -> $new_target"
                ;;
            esac
          fi
        done
      done
      echo "done"
    executable: /bin/bash
  register: _sieve_fix
  changed_when: "'fixed:' in _sieve_fix.stdout"

- name: Resolve container mail UID for host namespace
  become: true
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      SUBUID_START=$(grep '^{{ podman_mailserver_user }}:' /etc/subuid | cut -d: -f2)
      CONTAINER_UID=$(podman run --rm \
        {{ podman_mailserver_image }}:{{ podman_mailserver_version }}@{{ podman_mailserver_digest }} \
        id -u docker)
      echo "$(( SUBUID_START + CONTAINER_UID ))"
    executable: /bin/bash
  changed_when: false
  register: _host_mail_uid

- name: Fix ownership of mail data (host-mapped UID)
  become: true
  ansible.builtin.command:
    cmd: chown -Rh {{ _host_mail_uid.stdout }}:{{ _host_mail_uid.stdout }} {{ podman_mailserver_home }}/mail-data/
  changed_when: true
