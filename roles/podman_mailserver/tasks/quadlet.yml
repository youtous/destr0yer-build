- name: Deploy Quadlet pod unit
  become: true
  ansible.builtin.template:
    src: mailserver-pod.pod.j2
    dest: "{{ podman_mailserver_quadlet_dir }}/{{ podman_mailserver_pod_name }}.pod"
    owner: "{{ podman_mailserver_user }}"
    group: "{{ podman_mailserver_user }}"
    mode: "u=rw,g=r,o="
  notify:
    - Reload systemd user daemon
    - Restart mailserver pod

- name: Deploy Quadlet container units
  become: true
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ podman_mailserver_quadlet_dir }}/{{ item.dest }}"
    owner: "{{ podman_mailserver_user }}"
    group: "{{ podman_mailserver_user }}"
    mode: "u=rw,g=r,o="
  loop:
    - src: docker-mailserver.container.j2
      dest: "{{ podman_mailserver_container_name }}.container"
    - src: nginx-mail.container.j2
      dest: "{{ podman_mailserver_nginx_container_name }}.container"
    - src: autodiscover.container.j2
      dest: "{{ podman_mailserver_autodiscover_container_name }}.container"
  loop_control:
    label: "{{ item.dest }}"
  notify:
    - Reload systemd user daemon
    - Restart mailserver pod

- name: Reload systemd user daemon
  become: true
  become_user: "{{ podman_mailserver_user }}"
  become_method: community.general.machinectl
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user

- name: Enable and start mailserver pod
  become: true
  become_user: "{{ podman_mailserver_user }}"
  become_method: community.general.machinectl
  ansible.builtin.systemd:
    name: "{{ podman_mailserver_pod_name }}-pod"
    enabled: true
    state: started
    scope: user
