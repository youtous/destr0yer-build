- name: Verify Podman is installed
  become: true
  ansible.builtin.command:
    cmd: podman --version
  changed_when: false

- name: Create mailserver rootless user
  become: true
  ansible.builtin.user:
    name: "{{ podman_mailserver_user }}"
    uid: "{{ podman_mailserver_uid }}"
    system: true
    create_home: true
    home: "/home/{{ podman_mailserver_user }}"
    shell: /usr/sbin/nologin
    comment: "Docker Mailserver (Podman rootless)"

- name: Configure subuid for rootless Podman
  become: true
  ansible.builtin.lineinfile:
    path: /etc/subuid
    regexp: "^{{ podman_mailserver_user }}:"
    line: "{{ podman_mailserver_user }}:300000:65536"
    create: true
    owner: root
    group: root
    mode: "u=rw,g=r,o=r"

- name: Configure subgid for rootless Podman
  become: true
  ansible.builtin.lineinfile:
    path: /etc/subgid
    regexp: "^{{ podman_mailserver_user }}:"
    line: "{{ podman_mailserver_user }}:300000:65536"
    create: true
    owner: root
    group: root
    mode: "u=rw,g=r,o=r"

- name: Enable lingering for boot persistence
  become: true
  ansible.builtin.command:
    cmd: "loginctl enable-linger {{ podman_mailserver_user }}"
    creates: "/var/lib/systemd/linger/{{ podman_mailserver_user }}"
