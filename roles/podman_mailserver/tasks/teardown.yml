# 1. Stop and disable the pod (stops all 3 containers)
- name: Stop mailserver pod
  become: true
  become_user: "{{ podman_mailserver_user }}"
  ansible.builtin.systemd:
    name: "{{ podman_mailserver_pod_name }}-pod"
    state: stopped
    enabled: false
    scope: user
  environment:
    XDG_RUNTIME_DIR: "{{ podman_mailserver_xdg_runtime_dir }}"
  failed_when: false

# 2. Remove all Quadlet unit files
- name: Remove Quadlet units
  become: true
  ansible.builtin.file:
    path: "{{ podman_mailserver_quadlet_dir }}/{{ item }}"
    state: absent
  loop: "{{ podman_mailserver_quadlet_files }}"

# 3. Reload systemd to unregister units
- name: Reload systemd user daemon after unit removal
  become: true
  become_user: "{{ podman_mailserver_user }}"
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user
  environment:
    XDG_RUNTIME_DIR: "{{ podman_mailserver_xdg_runtime_dir }}"
  failed_when: false

# 4. Remove pod and containers
- name: Remove Podman pod and containers
  become: true
  become_user: "{{ podman_mailserver_user }}"
  ansible.builtin.command:
    cmd: "podman pod rm -f {{ podman_mailserver_pod_name }}"
  environment:
    XDG_RUNTIME_DIR: "{{ podman_mailserver_xdg_runtime_dir }}"
  failed_when: false
  changed_when: true

- name: Remove container images
  become: true
  become_user: "{{ podman_mailserver_user }}"
  ansible.builtin.command:
    cmd: "podman rmi -f {{ item }}"
  environment:
    XDG_RUNTIME_DIR: "{{ podman_mailserver_xdg_runtime_dir }}"
  loop:
    - "{{ podman_mailserver_image }}:{{ podman_mailserver_version }}@{{ podman_mailserver_digest }}"
    - "{{ podman_mailserver_nginx_image }}:{{ podman_mailserver_nginx_version }}@{{ podman_mailserver_nginx_digest }}"
    - "{{ podman_mailserver_autodiscover_image }}:{{ podman_mailserver_autodiscover_version }}@{{ podman_mailserver_autodiscover_digest }}"
  failed_when: false
  changed_when: true

# 5. Clean rootless Podman storage (layers, cache)
- name: Prune Podman storage
  become: true
  become_user: "{{ podman_mailserver_user }}"
  ansible.builtin.command:
    cmd: podman system prune -af
  environment:
    XDG_RUNTIME_DIR: "{{ podman_mailserver_xdg_runtime_dir }}"
  failed_when: false
  changed_when: true

# 6. Remove UFW rules
- name: Remove UFW rule for SMTP
  ansible.builtin.include_tasks: teardown-ufw.yml
  vars:
    podman_mailserver_teardown_port: "25"

- name: Remove UFW rule for HTTP
  ansible.builtin.include_tasks: teardown-ufw.yml
  vars:
    podman_mailserver_teardown_port: "80"

- name: Remove UFW rule for HTTPS
  ansible.builtin.include_tasks: teardown-ufw.yml
  vars:
    podman_mailserver_teardown_port: "443"

- name: Remove UFW rule for SMTPS
  ansible.builtin.include_tasks: teardown-ufw.yml
  vars:
    podman_mailserver_teardown_port: "465"

- name: Remove UFW rule for Submission
  ansible.builtin.include_tasks: teardown-ufw.yml
  vars:
    podman_mailserver_teardown_port: "587"

- name: Remove UFW rule for IMAPS
  ansible.builtin.include_tasks: teardown-ufw.yml
  vars:
    podman_mailserver_teardown_port: "993"

# 6. Remove config and TLS files (always)
- name: Remove config and TLS directories
  become: true
  ansible.builtin.file:
    path: "{{ podman_mailserver_home }}/{{ item }}"
    state: absent
  loop:
    - "config"
    - "tls"
    - "nginx"

# 7. Conditional: purge mail data
- name: Purge mail data directories
  become: true
  ansible.builtin.file:
    path: "{{ podman_mailserver_home }}/{{ item }}"
    state: absent
  loop:
    - "mail-data"
    - "mail-state"
    - "mail-log"
  when: podman_mailserver_teardown_purge_data | bool

- name: Remove mailserver home if fully purged
  become: true
  ansible.builtin.file:
    path: "{{ podman_mailserver_home }}"
    state: absent
  when: podman_mailserver_teardown_purge_data | bool

# 8. Disable linger
- name: Disable lingering
  become: true
  ansible.builtin.command:
    cmd: "loginctl disable-linger {{ podman_mailserver_user }}"
    removes: "/var/lib/systemd/linger/{{ podman_mailserver_user }}"
  when: podman_mailserver_teardown_purge_data | bool

# 9. Remove user (only with full purge)
- name: Remove mailserver system user
  become: true
  ansible.builtin.user:
    name: "{{ podman_mailserver_user }}"
    state: absent
    remove: true
  when: podman_mailserver_teardown_purge_data | bool

- name: Remove subuid entry
  become: true
  ansible.builtin.lineinfile:
    path: /etc/subuid
    regexp: "^{{ podman_mailserver_user }}:"
    state: absent
  when: podman_mailserver_teardown_purge_data | bool

- name: Remove subgid entry
  become: true
  ansible.builtin.lineinfile:
    path: /etc/subgid
    regexp: "^{{ podman_mailserver_user }}:"
    state: absent
  when: podman_mailserver_teardown_purge_data | bool
