# Install Monit from sources
- name: Check Monit version is {{ monit_version }}
  ansible.builtin.shell: >
    set -o pipefail && {{ monit_binary_path }} --version | grep {{ monit_version | quote }}
  changed_when: false
  register: monit_present
  ignore_errors: true
  args:
    executable: /bin/bash

- name: Create temporary download directory
  ansible.builtin.file:
    path: "{{ monit_download_dest_directory }}"
    state: directory
    mode: u=rwx,g=rx,o=rx
  when: monit_present is failed

- name: Download Monit checksum
  ansible.builtin.get_url:
    url: "{{ monit_checksum_url }}"
    dest: "{{ monit_download_dest_directory }}/monit.tar.gz.sha256"
    mode: "u=rw,g=,o="
  when: monit_present is failed

- name: Extract expected checksum for Monit archive
  ansible.builtin.shell:
    cmd: >
      set -o pipefail && awk '{print $1}' {{ monit_download_dest_directory }}/monit.tar.gz.sha256
    executable: /bin/bash
  changed_when: false
  register: monit_expected_checksum
  when: monit_present is failed

- name: Download Monit archive
  ansible.builtin.get_url:
    url: "{{ monit_download_uri }}"
    dest: "{{ monit_download_dest_directory }}/monit.tar.gz"
    checksum: "sha256:{{ monit_expected_checksum.stdout }}"
    mode: "u=rw,g=,o="
  when: monit_present is failed

- name: Extract Monit archive
  ansible.builtin.unarchive:
    remote_src: true
    src: "{{ monit_download_dest_directory }}/monit.tar.gz"
    dest: "{{ monit_download_dest_directory }}"
  when: monit_present is failed

- name: Copy Monit binary
  become: true
  ansible.builtin.copy:
    remote_src: true
    src: "{{ monit_download_dest_directory }}/monit-{{ monit_version }}/bin/monit"
    dest: "{{ monit_binary_path }}"
    owner: root
    group: root
    mode: u=rwx,g=rx,o=rx
  when: monit_present is failed

- name: Create Monit configuration directory
  become: true
  ansible.builtin.file:
    path: /etc/monit
    state: directory
    owner: root
    group: root
    mode: "u=rwx,g=rx,o=rx"

- name: Create Monit additional configuration directory
  become: true
  ansible.builtin.file:
    path: /etc/monit/conf.d
    state: directory
    owner: root
    group: root
    mode: "u=rwx,g=rx,o=rx"

- name: Create Monit var directory
  become: true
  ansible.builtin.file:
    path: "{{ monit_var_directory }}"
    state: directory
    owner: root
    group: root
    mode: u=rwx,g=rx,o=rx

- name: Copy Monit default configuration
  become: true
  ansible.builtin.copy:
    remote_src: true
    src: "{{ monit_download_dest_directory }}/monit-{{ monit_version }}/conf/monitrc"
    dest: /etc/monit/monitrc
    owner: root
    group: root
    mode: "u=rw,g=,o="
  when: monit_present is failed

- name: Create a symbolic link for monitrc
  become: true
  ansible.builtin.file:
    src: /etc/monit/monitrc
    dest: /etc/monitrc
    owner: root
    group: root
    state: link

# according https://mmonit.com/wiki/Monit/Systemd
- name: Create systemd startup script for Monit
  become: true
  ansible.builtin.copy:
    src: "files/systemd/monit.service"
    dest: "/lib/systemd/system/monit.service"
    owner: root
    group: root
    mode: u=rw,g=r,o=r
  notify:
    - Reload monit systemd
    - Restart monit

- name: Clean temporary directory
  become: true
  ansible.builtin.file:
    state: absent
    path: "{{ monit_download_dest_directory }}"
  when: monit_present is failed
