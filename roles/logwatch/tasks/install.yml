- name: Remove legacy apt pinning (was needed for Debian < 11)
  become: true
  ansible.builtin.file:
    path: "{{ apt_directory }}/preferences.d/45-logwatch"
    state: absent

- name: Install logwatch
  become: true
  ansible.builtin.apt:  # noqa package-latest
    update_cache: true
    name:
      - logwatch
      - cron
    state: latest

- name: Enable cron
  become: true
  ansible.builtin.service:
    name: cron
    state: started
    enabled: true
