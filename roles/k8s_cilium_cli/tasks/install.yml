- name: Create build directory
  ansible.builtin.tempfile:
    state: directory
    suffix: build
    path: "{{ ansible_env.HOME }}/.ansible/tmp"
  register: tmp_dir_build

- name: Download cilium-cli checksum
  ansible.builtin.get_url:
    url: "{{ k8s_cilium_checksum_url }}"
    dest: "{{ tmp_dir_build.path }}/{{ k8s_cilium_archive_name }}.sha256sum"
    mode: "u=rw,g=,o="

- name: Extract expected checksum for cilium-cli archive
  ansible.builtin.shell:
    cmd: >
      set -o pipefail && awk '{print $1}' {{ tmp_dir_build.path }}/{{ k8s_cilium_archive_name }}.sha256sum
    executable: /bin/bash
  changed_when: false
  register: k8s_cilium_expected_checksum

- name: Download cilium-cli release and verify checksum
  ansible.builtin.get_url:
    url: "{{ k8s_cilium_download_release_url }}"
    dest: "{{ tmp_dir_build.path }}/{{ k8s_cilium_archive_name }}"
    checksum: "sha256:{{ k8s_cilium_expected_checksum.stdout }}"
    mode: "u=rw,g=,o="

- name: Extract downloaded release
  ansible.builtin.unarchive:
    src: "{{ tmp_dir_build.path }}/{{ k8s_cilium_archive_name }}"
    dest: "{{ tmp_dir_build.path }}"
    remote_src: true

- name: Copy cilium binary
  become: true
  ansible.builtin.copy:
    remote_src: true
    src: "{{ tmp_dir_build.path }}/cilium"
    dest: "{{ k8s_cilium_path }}"
    owner: root
    group: root
    mode: u=rwx,g=rx,o=rx

- name: Remove the temporary build directory
  ansible.builtin.file:
    path: "{{ tmp_dir_build.path }}"
    state: absent
