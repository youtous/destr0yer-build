- name: Check if Gateway API CRDs are installed
  become: true
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: gateways.gateway.networking.k8s.io
  register: cilium__gateway_api_crds
  failed_when: false
  environment:
    KUBECONFIG: "{{ cilium_kubeconfig_path }}"

- name: Install Gateway API standard CRDs
  when: cilium__gateway_api_crds.resources is not defined or cilium__gateway_api_crds.resources | length == 0
  block:
    - name: Download Gateway API CRD files
      ansible.builtin.get_url:
        url: "{{ cilium_gateway_api_crds_base_url }}/{{ item }}"
        dest: "{{ tmp_dir_build.path }}/gateway-api-{{ item }}"
        mode: "u=rw,g=r,o=r"
      loop: "{{ cilium_gateway_api_crd_files }}"

    - name: Apply Gateway API CRD files
      become: true
      kubernetes.core.k8s:
        state: present
        src: "{{ tmp_dir_build.path }}/gateway-api-{{ item }}"
      loop: "{{ cilium_gateway_api_crd_files }}"
      environment:
        KUBECONFIG: "{{ cilium_kubeconfig_path }}"

    - name: Cleanup Gateway API CRD files
      ansible.builtin.file:
        path: "{{ tmp_dir_build.path }}/gateway-api-{{ item }}"
        state: absent
      loop: "{{ cilium_gateway_api_crd_files }}"

- name: Apply Prometheus ServiceMonitor CRD (required for Cilium ServiceMonitors)
  become: true
  ansible.builtin.command:
    cmd: >
      kubectl apply --server-side -f
      https://raw.githubusercontent.com/prometheus-operator/prometheus-operator/{{ cilium_prometheus_operator_version }}/example/prometheus-operator-crd/monitoring.coreos.com_servicemonitors.yaml
  register: cilium__servicemonitor_crd
  changed_when: "'serverside-applied' in cilium__servicemonitor_crd.stdout"
  environment:
    KUBECONFIG: "{{ cilium_kubeconfig_path }}"

- name: Create build directory
  ansible.builtin.tempfile:
    state: directory
    suffix: build
    path: "{{ ansible_env.HOME }}/.ansible/tmp"
  register: tmp_dir_build

- name: Fetch Cilium Helm repo index
  ansible.builtin.uri:
    url: "{{ cilium_chart_repo_url }}/index.yaml"
    return_content: true
  register: _cilium_helm_index

- name: Extract chart digest from Helm index
  ansible.builtin.set_fact:
    _cilium_chart_digest: >-
      {{ (_cilium_helm_index.content | from_yaml).entries.cilium
         | selectattr('version', 'equalto', cilium_chart_version)
         | map(attribute='digest')
         | first }}

- name: Download the chart
  ansible.builtin.get_url:
    url: "{{ cilium_chart_download_url }}"
    dest: "{{ tmp_dir_build.path }}/{{ cilium_chart_archive_name }}"
    checksum: "sha256:{{ _cilium_chart_digest }}"
    mode: "u=rw,g=,o="

- name: Install cilium chart
  become: true
  kubernetes.core.helm:
    name: "{{ cilium_helm_release_name }}"
    chart_ref: "{{ tmp_dir_build.path }}/{{ cilium_chart_archive_name }}"
    release_namespace: "{{ cilium_k8s_namespace }}"
    create_namespace: true
    values: "{{ cilium_k8s_helm_values }}"
  register: cilium__helm_install_chart
  environment:
    KUBECONFIG: "{{ cilium_kubeconfig_path }}"

- name: Show install helm chart command
  when:
    - cilium__helm_install_chart is defined
    - cilium__helm_install_chart.stdout is defined
    - cilium_helm_show_commands
  ansible.builtin.debug:
    var: cilium__helm_install_chart.stdout

- name: Cleanup build directory
  ansible.builtin.file:
    state: absent
    path: "{{ tmp_dir_build.path }}"
