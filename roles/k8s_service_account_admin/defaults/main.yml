k8s_service_account_admin_name: "alfred-admin"

k8s_service_account_admin_namespace: "kube-system"

k8s_service_account_admin_server: "https://127.0.0.1:6443"
k8s_service_account_admin_kubeconfig_destination: "~/.kube/config"

# Ephemeral cluster-admin token TTL. Tokens are generated at deploy time via
# `kubectl create token` and are not stored long-term — regenerate when needed.
k8s_service_account_admin_token_duration: "24h"

k8s_service_account_admin_kubeconfig_path: /etc/rancher/k3s/k3s.yaml
