# This role contains the default policy for fail2ban
- name: Create fail2ban systemd override directory
  become: true
  ansible.builtin.file:
    path: /etc/systemd/system/fail2ban.service.d
    state: directory
    owner: root
    group: root
    mode: "u=rwx,g=rx,o=rx"

- name: Deploy fail2ban hardening override
  become: true
  ansible.builtin.copy:
    dest: /etc/systemd/system/fail2ban.service.d/hardening.conf
    content: |
      [Service]
      NoNewPrivileges=true
      PrivateDevices=true
      PrivateTmp=true
      ProtectHome=yes
      ProtectKernelLogs=true
      ProtectHostname=true
      ProtectClock=true
      RestrictRealtime=true
      RestrictSUIDSGID=true
      LockPersonality=true
      RestrictAddressFamilies=AF_UNIX AF_INET AF_INET6 AF_NETLINK
    owner: root
    group: root
    mode: "u=rw,g=r,o=r"
  notify: Restart fail2ban

- name: Install fail2ban backend packages
  become: true
  ansible.builtin.apt:
    name:
      - python3-systemd
  notify:
    - Restart fail2ban

- name: Setup fail2ban
  become: true
  ansible.builtin.import_role:
    name: oefenweb.fail2ban

- name: Copy fail2ban configurations files
  become: true
  ansible.builtin.copy:
    src: "files/{{ item.src }}"
    dest: "/etc/fail2ban/{{ item.dest }}"
    owner: root
    group: root
    mode: u=rw,g=r,o=r
  notify:
    - Restart fail2ban
  with_items:
    - {src: filter.d/recidive.conf, dest: filter.d/recidive.conf,}  # update from upstream, default debian don't match

- name: Configure logrotate for fail2ban
  ansible.builtin.import_role:
    name: logrotate
  vars:
    logrotate_applications:
      - name: fail2ban
        definitions:
          - logs:
              - "{{ fail2ban_logtarget }}"
            options:
              - monthly
              - rotate 12
              - size 10M
              - compress
              - delaycompress
              - missingok
              - notifempty
              - create 0640 root root
  when: fail2ban_logtarget not in ['SYSLOG', 'STDERR', 'STDOUT']
