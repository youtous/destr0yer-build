# Configure sysctl on the host with various optimizations
# Write to /etc/sysctl.d/ for proper systemd-sysctl.service loading on Debian 13+

# All values are applied live via sysctl_set + reload — no reboot needed.
# They persist across reboots via /etc/sysctl.d/90-destr0yer.conf (loaded by systemd-sysctl.service).

- name: Increase max connections
  become: true
  ansible.posix.sysctl:
    name: net.core.somaxconn
    value: "{{ sysctl_net_core_somaxconn }}"
    sysctl_set: true
    sysctl_file: /etc/sysctl.d/90-destr0yer.conf
    state: present
    reload: true

- name: Define unprivileged ports start
  become: true
  ansible.posix.sysctl:
    name: net.ipv4.ip_unprivileged_port_start
    value: "{{ sysctl_net_ipv4_ip_unprivileged_port_start }}"
    sysctl_set: true
    sysctl_file: /etc/sysctl.d/90-destr0yer.conf
    state: present
    reload: true

- name: Configure overcommit memory
  become: true
  ansible.posix.sysctl:
