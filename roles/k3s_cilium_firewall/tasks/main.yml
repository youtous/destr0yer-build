# see https://docs.cilium.io/en/stable/operations/system_requirements/

- name: "UFW allow cilium requirements firewall - udp/6081 GENEVE overlay"
  become: true
  ansible.builtin.import_role:
    name: youtous.destr0yer.ufw_smart_rules
  vars:
    ufw_rule_parameters:  # noqa: var-naming[no-role-prefix]
      to_port: "6081"
      rule: "allow"
      proto: "udp"
      direction: in
    ufw_rules_criteria: from_ips
    ufw_rule_from_ips: "{{ k3s_all_nodes_ips }}"

