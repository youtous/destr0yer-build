### WireGuard — ctrl node planes
# Each ctrl has up to 3 WG interfaces (see doc/networking.md#wireguard-plane-separation):
#   wg-admin     :41994  Admin access (via relay DNAT or direct)
#   wg-infra-ext :41993  Service traffic from relay (HAProxy TCP)
#   wg-infra-int :41991  Inter-cluster mesh (future, Garage replication)
#
# wireguard_server_external_interface: eth0
# wireguard_servers:
#
#   # ── wg-admin: admin ops (SSH, kubectl) ──
#   - interface: wg-admin
#     addresses:
#       - 10.99.98.1/24
#     port: "41994"
#     public_key: "CTRL_ADMIN_PUBLIC_KEY"
#     private_key: "{{ vault_wg_admin_private_key }}"
#     restrict_ips: ["10.99.98.0/24"]
#     peers:
#       - name: admin-laptop
#         public_key: "ADMIN_LAPTOP_PUBLIC_KEY"
#         preshared_key: "{{ vault_admin_laptop_psk }}"
#         allowed_ips:
#           - 10.99.98.100/32
#         persistent_keepalive: ""
#     pre_up: []
#     pre_down: []
#     post_up:
#       - "iptables -F wg-filter-admin || true"
#       - "iptables -t filter -N wg-filter-admin || true"
#       - "iptables -t filter -A wg-filter-admin -p tcp --dport 22 -j ACCEPT"
#       - "iptables -t filter -A wg-filter-admin -p icmp -j ACCEPT"
#       - "iptables -t filter -A wg-filter-admin -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT"
#       - "iptables -t filter -A wg-filter-admin -j DROP"
#       - "iptables -t filter -I INPUT -i %i -j wg-filter-admin"
#     post_down:
#       - "iptables -t filter -D INPUT -i %i -j wg-filter-admin || true"
#       - "iptables -F wg-filter-admin || true"
#       - "iptables -X wg-filter-admin || true"
#     mtu: ""
#
# For clusters behind a relay (no fixed IP), the relay blindly DNATs
# UDP 41994 → ctrl:41994 (same port, no translation). Admin authenticates
# directly on ctrl by WG cryptokey — relay is zero-trust.
# See relay.sample/main.yml for DNAT setup.
# See doc/security.md#wireguard-plane-isolation for threat model.

### WireGuard client — relay tunnel (ctrl → relay for services)
# Ctrl connects to relay's wg-infra-ext as a client.
# persistent_keepalive keeps the tunnel alive through NAT.
#
# Security: do NOT use a public DNS name for the endpoint.
# Use raw IP or /etc/hosts entry (see ADR-005 "Endpoint hardening").
# Managed by the system role's `hosts_entries` variable.
#
# wireguard_clients:
#   - interface: wg-infra-ext
#     name: ctrl
#     addresses:
#       - 10.99.99.10/24
#     endpoint: "relay-infra:41993"
#     persistent_keepalive: "25"
#     allowed_ips:
#       - 10.99.99.0/24
#     server_public_key: "RELAY_PUBLIC_KEY"
#     public_key: "CTRL_PUBLIC_KEY"
#     private_key: "{{ vault_wg_infra_ext_private_key }}"
#     preshared_key: "{{ vault_wg_infra_ext_psk }}"

