### WireGuard client — cloud relay tunnel (self-hosted → relay)
# The relay is the WG server (public IP, non-standard port).
# The self-hosted node is the client (behind NAT, initiates connection).
# persistent_keepalive keeps the tunnel alive through NAT.
#
# Security: do NOT use a public DNS name for the endpoint.
# Use raw IP or /etc/hosts entry (see ADR-005 "Endpoint hardening").
# Example /etc/hosts: `203.0.113.42  relay-infra`
# Managed by the system role's `hosts_entries` variable.
#
# wireguard_clients:
#   - interface: wg-infra
#     name: ctrl
#     addresses:
#       - 10.99.99.10/24
#     endpoint: "relay-infra:41993"  # resolved via /etc/hosts, non-standard port
#     persistent_keepalive: "25"
#     allowed_ips:
#       - 10.99.99.0/24  # route relay subnet through tunnel
#     server_public_key: "RELAY_PUBLIC_KEY"
#     public_key: "CTRL_PUBLIC_KEY"
#     private_key: "{{ vault_wg_infra_private_key }}"
#     preshared_key: "{{ vault_wg_infra_psk }}"

